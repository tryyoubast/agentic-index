name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        run: PYTHONPATH=src:. python -m unittest discover -s tests -v
      - name: Regenerate site
        run: PYTHONPATH=src:. python scripts/generate_site.py
      - name: Check generated site drift
        run: git diff --exit-code public/index.html
